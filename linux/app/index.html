<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WaifuX</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="top-nav">
      <div class="window-dots" aria-hidden="true">
        <span class="dot close"></span>
        <span class="dot min"></span>
        <span class="dot max"></span>
      </div>
      <nav class="tab-strip" aria-label="主导航">
        <button class="tab active" data-tab="home">首页</button>
        <button class="tab" data-tab="wallpaper">壁纸</button>
        <button class="tab" data-tab="media">媒体</button>
        <button class="tab" data-tab="anime">动漫</button>
        <button class="tab" data-tab="library">我的</button>
      </nav>
      <button id="settingsBtn" class="icon-button" title="设置" aria-label="设置">
        <span>⚙</span>
      </button>
    </header>

    <main id="viewHost" class="view-host"></main>
  </div>

  <div id="detailLayer" class="detail-layer hidden"></div>
  <div id="toastHost" class="toast-host" aria-live="polite"></div>

  <script src="/app.js" defer></script>
</body>
</html>
